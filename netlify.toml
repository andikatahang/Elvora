[build]
  command = "npm install && npm run build:css && echo \"window.__ENV = { SUPABASE_URL: '${SUPABASE_URL}', SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}' };\" > js/__env.js"
  publish = "."

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = ".planning"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
