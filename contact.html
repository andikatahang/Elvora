<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ &amp; Contact — ELVORA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
</head>
<body>
  <div id="nav-root"></div>

  <main>

    <!-- ═══ Section 1: Page Header ════════════════════════════════════════ -->
    <section class="bg-beige pt-32 pb-16 px-8 md:px-16 text-center">
      <span class="section-label">FAQ &amp; CONTACT</span>
      <h1 class="section-title mt-3">Questions &amp; Contact</h1>
      <p class="text-[15px] text-text-muted max-w-xl mx-auto mt-4 font-light">Everything you need to know about Elvora, your order, and our products.</p>
    </section>

    <!-- ═══ Section 2: FAQ Accordion ══════════════════════════════════════ -->
    <section
      class="bg-beige py-[60px] px-8 md:px-16 pb-[100px]"
      x-data="{
        activeIndex: null,
        faqs: [
          {
            q: 'How do I find my size?',
            a: 'Our size guide covers XS to XL with measurements for bust, waist, and hips. For activewear, we recommend choosing your regular size. If you are between sizes, size up for comfort. Detailed measurements are available on every product page.'
          },
          {
            q: 'What is your returns policy?',
            a: 'We offer a 30-day return window for all unworn items in their original condition with tags attached. Simply contact us at hello@elvora.com to initiate a return. Exchanges are also available within the same timeframe.'
          },
          {
            q: 'How long does shipping take?',
            a: 'Domestic orders are delivered within 3–5 business days. International shipping takes 7–14 business days depending on destination. Expedited shipping options are available at checkout. All orders over $150 qualify for free domestic shipping.'
          },
          {
            q: 'How should I care for my Elvora pieces?',
            a: 'Machine wash cold on a gentle cycle. Do not use fabric softener as it can degrade technical fabrics. Do not tumble dry — lay flat or hang to dry. Iron on low heat if needed. Proper care ensures your pieces retain their shape, performance, and colour.'
          },
          {
            q: 'Can I track my order?',
            a: 'Yes — you will receive an order confirmation email immediately after purchase, and a shipping confirmation with a tracking link within 24 hours of dispatch. You can also track your order through the My Account section once you are signed in.'
          },
          {
            q: 'How does the AI Style Match work?',
            a: 'Upload a photo of yourself and tell us your style preferences. Our AI analyses your look and recommends Elvora pieces personalised to your proportions and aesthetic. It works like having a premium personal stylist — no virtual try-on or generative imagery, just curated outfit suggestions from our catalog.'
          }
        ]
      }"
    >
      <div class="max-w-2xl mx-auto">
        <template x-for="(faq, i) in faqs" :key="i">
          <div class="border-b border-sage/20">
            <button
              @click="activeIndex = activeIndex === i ? null : i"
              :aria-expanded="activeIndex === i"
              class="flex items-center justify-between w-full py-5 text-left font-body text-[15px] font-medium text-charcoal cursor-pointer bg-transparent border-none"
            >
              <span x-text="faq.q"></span>
              <svg
                :class="{'rotate-180': activeIndex === i}"
                class="w-5 h-5 text-charcoal transition-transform duration-200 flex-shrink-0 ml-4"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
              </svg>
            </button>
            <div
              x-show="activeIndex === i"
              x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 -translate-y-2"
              x-transition:enter-end="opacity-100 translate-y-0"
              class="pb-5 text-[15px] leading-[1.8] font-light text-text-muted"
            >
              <p x-text="faq.a"></p>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- ═══ Section 3: Contact Info ═══════════════════════════════════════ -->
    <section class="bg-charcoal py-[80px] px-8 md:px-16 text-center">
      <h2 class="font-display text-[clamp(28px,3vw,40px)] font-bold text-white mb-4">Still have questions?</h2>
      <p class="text-white/65 text-[15px] font-light mb-10 max-w-md mx-auto">Our team is here to help. Reach out anytime.</p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-lg mx-auto">

        <!-- Email -->
        <div class="bg-white/10 rounded-[20px] p-8 text-center">
          <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center mx-auto mb-4">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </div>
          <p class="text-[11px] tracking-[3px] uppercase text-white/50 mb-2">Email Us</p>
          <a href="mailto:hello@elvora.com" class="text-white font-medium hover:text-rose transition-colors no-underline">hello@elvora.com</a>
        </div>

        <!-- Instagram -->
        <div class="bg-white/10 rounded-[20px] p-8 text-center">
          <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center mx-auto mb-4">
            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
          </div>
          <p class="text-[11px] tracking-[3px] uppercase text-white/50 mb-2">Follow Us</p>
          <a href="https://instagram.com/elvorastudio" target="_blank" rel="noopener noreferrer" class="text-white font-medium hover:text-rose transition-colors no-underline">@elvorastudio</a>
        </div>

      </div>
    </section>

  </main>

  <div id="footer-root"></div>
  <script src="/js/__env.js"></script>
  <script type="module" src="/js/supabase.js"></script>
  <script type="module" src="/js/components.js"></script>
</body>
</html>
